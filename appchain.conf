# appchain.conf — the one file you edit to make this appchain yours.
#
# Sourced (as shell) by scripts/*, scripts/lib/config.sh, and the GitHub workflows.
# Everything here is NON-SECRET and safe to commit. Secrets (settlement account key,
# prover key, Slack webhook, Grafana password) live in GitHub secrets / a local .env —
# see SETUP.md and .env.example.
#
# Each (network, mode) combo derives its own systemd unit, state dir, and ports from
# these values — see scripts/lib/config.sh for the exact derivation.

# ---- Identity ----------------------------------------------------------------
# Slug ([a-z0-9-]) that prefixes systemd units (<name>-sepolia-enclave, …),
# state dirs (/var/lib/<unit>), and env dirs (/etc/<unit>).
CHAIN_NAME=mychain

# Rollup chain ids (felt short-strings, <= 31 ASCII chars) — baked into the chain
# at `katana init rollup` time by the Init workflow.
CHAIN_ID_TESTNET=MYCHAIN_TESTNET
CHAIN_ID_MAINNET=MYCHAIN_MAINNET

# ---- Public endpoints --------------------------------------------------------
# nginx RPC router vhost: /sepolia/rpc /mainnet/rpc /sepolia-mock/rpc /mainnet-mock/rpc.
APPCHAIN_DOMAIN=appchain.example.com
# Grafana vhost (monitoring stack; see scripts/deploy-monitoring.sh).
GRAFANA_DOMAIN=grafana.example.com

# ---- Host --------------------------------------------------------------------
# SSH/deploy user on the SEV-SNP host; also the systemd User= for mock units.
DEPLOY_USER=ubuntu
# Optional default host for scripts run from a laptop (appchainctl). The workflows
# take the host from the DEPLOY_HOST repo var (or their `host` input) instead.
# Leave empty if you'd rather not commit the address.
DEPLOY_HOST=""

# ---- Ports -------------------------------------------------------------------
# Derived per combo: +0 sepolia-mock, +1 sepolia-enclave, +2 mainnet-enclave,
# +3 mainnet-mock. Defaults give RPC 5070..5073 and metrics 9110..9113.
BASE_PORT=5070
METRICS_BASE_PORT=9110
# Grafana container port. 3001, not 3000: the mock node's vrf-server sidecar
# binds 127.0.0.1:3000 on the same host.
GRAFANA_PORT=3001

# ---- Settlement network ------------------------------------------------------
# Starknet RPC v0_9 endpoints the rollup settles through. The Cartridge public
# endpoints are free to use; any v0_9-compatible provider works.
SETTLEMENT_RPC_SEPOLIA=https://api.cartridge.gg/x/starknet/sepolia/rpc/v0_9
SETTLEMENT_RPC_MAINNET=https://api.cartridge.gg/x/starknet/mainnet/rpc/v0_9

# ---- TEE fact registries -----------------------------------------------------
# On-chain registries piltover's fact-registry is wired to. These defaults are the
# canonical deployed registries (shared public infra — you almost never change them):
#   enclave → the real AMDTeeRegistry (verifies the SP1 Groth16 proof + AMD cert chain)
#   mock    → the mock registry (accepts --tee mock's software attestation; Sepolia-only)
TEE_REGISTRY_SEPOLIA=0x06616163a5221890df1772a504f94d02122a12ed5b4c35ef7480b19b04c73761
TEE_REGISTRY_MAINNET=0x04ec71aee9b92315ec2a7368eace15fd82fd816dd74ce9d0afcfc7077cf9fe2d
TEE_REGISTRY_MOCK=0x37189b1807f1358074b70b3dc8ab79167bbf72cff1296286052f6dfe31c8f15

# ---- Version pins ------------------------------------------------------------
# katana BINARY release (mock mode: the native build the host runs, and `init rollup`).
KATANA_VERSION=v1.8.0-rc.8
# Prebuilt SEV-SNP TEE-VM image (enclave mode): OVMF+kernel+initrd+katana, fetched
# from the katana release by run-enclave.sh. Measured — see TEE.md.
KATANA_TEE_VERSION=tee-vm-v0.3.0+katana-v1.8.0-rc.8

# ---- Tunables ----------------------------------------------------------------
# Appchain block time (ms); passed to katana as --block-time.
BLOCK_TIME_MS=5000
# Combos scraped by prometheus/blackbox and polled for head blocks — list only the
# ones you actually deploy, or the down-alerts for the missing ones page forever.
# Re-run scripts/deploy-monitoring.sh after changing.
MONITORED_COMBOS="sepolia-mock sepolia-enclave mainnet-enclave"
